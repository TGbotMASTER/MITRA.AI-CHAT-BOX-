<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MITRA.AI - Made by Aayush</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* ================= ULTRA PREMIUM PRO CSS ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body, html {
            background: linear-gradient(135deg, #050505 0%, #121021 100%);
            color: #e2e8f0; height: 100%; width: 100%; display: flex; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px; background: rgba(13, 15, 25, 0.95); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            padding: 20px 10px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
        }

        .action-btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: 0.3s; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .export-btn { background: #1e293b; border: 1px solid #334155; color: #38bdf8; }

        .chat-list { flex: 1; overflow-y: auto; list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .chat-item {
            padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px;
            color: #94a3b8; border-left: 3px solid transparent; transition: 0.2s;
        }
        .chat-item.active { background: rgba(14, 165, 233, 0.1); color: #38bdf8; border-left: 3px solid #0ea5e9; }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; height: 100%; }

        .mobile-header {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 20px;
            background: rgba(13, 15, 25, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .brand-container { display: flex; flex-direction: column; }
        .title-main { font-size: 18px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sub { font-size: 10px; color: #64748b; font-weight: bold; letter-spacing: 2px; }

        .mood-selector { background: #1e293b; color: #38bdf8; border: 1px solid #334155; padding: 6px 10px; border-radius: 8px; font-size: 13px; outline: none; font-weight: bold; cursor: pointer; }

        /* Chat Container */
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .user-wrapper { align-self: flex-end; }
        .bot-wrapper { align-self: flex-start; max-width: 90%; }

        .message { padding: 14px 18px; border-radius: 14px; line-height: 1.6; font-size: 15px; word-wrap: break-word; position: relative; }
        .user-message { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); }
        .bot-message { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); color: #f8fafc; border-bottom-left-radius: 4px; padding-bottom: 30px; }

        .message img { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; margin-top: 5px; margin-bottom: 5px; object-fit: contain; }

        /* Code Block Styling */
        .code-container { position: relative; margin: 10px 0; }
        .bot-message pre { background: #0b0f19; padding: 12px; padding-top: 35px; border-radius: 8px; overflow-x: auto; border: 1px solid #334155; margin: 0; }
        .bot-message code { font-family: monospace; font-size: 14px; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #38bdf8; color: #000; border: none; padding: 4px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; z-index: 5; }
        .copy-btn:hover { background: #0ea5e9; }

        /* TTS Button */
        .tts-btn { position: absolute; bottom: 8px; right: 12px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .tts-btn:hover { color: #38bdf8; transform: scale(1.1); }

        .error-text { color: #f87171 !important; font-size: 13px; margin-top: 5px; background: rgba(248, 113, 113, 0.1); padding: 8px; border-radius: 6px; border: 1px solid rgba(248, 113, 113, 0.3); word-wrap: break-word; }
        .error-divider { border-top: 1px dashed rgba(248, 113, 113, 0.3); margin: 8px 0; }

        /* Input Area */
        .input-area { padding: 12px 15px; background: rgba(13, 15, 25, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        
        .image-preview-container { display: none; position: relative; width: fit-content; }
        .image-preview-container img { height: 60px; border-radius: 8px; border: 2px solid #38bdf8; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; }

        .input-box { display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 6px 10px; align-items: center; gap: 8px; transition: 0.3s; }
        .input-box:focus-within { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .icon-btn { background: transparent; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 5px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: #38bdf8; transform: scale(1.1); }

        input[type="text"] { flex: 1; background: transparent; border: none; padding: 8px 5px; color: white; font-size: 15px; outline: none; min-width: 0; }
        input[type="file"] { display: none; }

        .send-btn { background: #38bdf8; color: #050505; border: none; border-radius: 8px; padding: 8px 16px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; min-width: 70px; text-align: center; }
        .send-btn:hover { opacity: 0.9; }
        .thinking { display: none; align-self: flex-start; padding: 10px; color: #38bdf8; font-size: 13px; font-weight: bold; animation: pulse 1.5s infinite; }
        .model-info { font-size: 10px; color: #64748b; font-weight: normal; margin-left: 5px; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Modals and Overlays */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; width: 280px; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .message-wrapper { max-width: 95%; }
        }
        .overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }
        
        /* Typing Cursor */
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #38bdf8; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="brand-container" style="text-align: center; margin-bottom: 20px;">
            <div class="title-main" style="font-size: 24px;">✨ MITRA.AI</div>
            <div class="title-sub">MADE BY AAYUSH</div>
        </div>
        
        <button class="action-btn" onclick="createNewChat()">+ Nayi Chat</button>
        <button class="action-btn export-btn" onclick="downloadPDF()">📥 Download Notes</button>
        
        <ul class="chat-list" id="chat-list"></ul>
    </div>

    <div class="main-chat">
        <div class="mobile-header">
            <div class="header-left">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="brand-container">
                    <div class="title-main">MITRA.AI</div>
                    <div class="title-sub">MADE BY AAYUSH</div>
                </div>
            </div>
            
            <select class="mood-selector" id="mood-selector">
                <option value="friend">🤝 Friend</option>
                <option value="teacher">👨‍🏫 Teacher</option>
                <option value="coder">💻 Coder</option>
                <option value="gamer">🎮 Gaming Buddy</option>
                <option value="dating">💘 Dating Coach</option>
                <option value="otaku">🎌 Otaku Mode</option>
                <option value="meme">😂 Meme Generator</option>
            </select>
        </div>

        <div class="chat-container" id="chat-box"></div>
        
        <div class="thinking" id="thinking-indicator">Mitra soch raha hai... ⚡</div>

        <div class="input-area">
            <div class="image-preview-container" id="image-preview-container">
                <img id="preview-img" src="" alt="preview">
                <button class="remove-img-btn" onclick="removeImage()">X</button>
            </div>

            <div class="input-box">
                <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Photo Bhej">📎</button>
                <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
                
                <button class="icon-btn" onclick="startMic()" title="Bol kar likho">🎙️</button>
                
                <input type="text" id="user-input" placeholder="Mitra se kuch puch..." onkeypress="handleEnter(event)" autocomplete="off">
                <button class="send-btn" id="send-btn" onclick="handleSendStop()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // 👇 YAHAN APNI NAYI/WORKING GOOGLE GEMINI API KEY DAAL DE BHAI 👇
        const API_KEY = "AIzaSyALCOdPlcP-D7l9ySBJZjlcr-DyADN4bm8"; 
        
        let chats = [];
        let currentChatId = null;
        let base64Image = null;
        let imageMimeType = null;
        let synth = window.speechSynthesis;
        
        let isGenerating = false;
        let abortController = null;
        let stopTypingFlag = false;
        let typingTimeout = null;

        const chatBox = document.getElementById("chat-box");
        const chatListUI = document.getElementById("chat-list");
        const userInput = document.getElementById("user-input");
        const thinkingIndicator = document.getElementById("thinking-indicator");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const moodSelector = document.getElementById("mood-selector");
        const previewContainer = document.getElementById("image-preview-container");
        const previewImg = document.getElementById("preview-img");
        const sendBtn = document.getElementById("send-btn");

        window.onload = () => {
            // Updated to v11 taaki nayi identity fresh load ho
            const savedChats = localStorage.getItem("mitra_chats_v11");
            if (savedChats) {
                chats = JSON.parse(savedChats);
                if (chats.length > 0) currentChatId = chats[0].id;
            }
            if (chats.length === 0) createNewChat();
            else { renderSidebar(); renderMessages(); }
        };

        function toggleSidebar() {
            sidebar.classList.toggle("open");
            overlay.classList.toggle("active");
        }

        function downloadPDF() {
            const element = document.getElementById('chat-box');
            const opt = {
                margin: 1, filename: 'Mitra-AI-Notes.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const fullResult = e.target.result;
                base64Image = fullResult.split(',')[1];
                imageMimeType = file.type;
                previewImg.src = fullResult;
                previewContainer.style.display = "block";
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            base64Image = null; imageMimeType = null;
            previewContainer.style.display = "none";
            document.getElementById('file-input').value = "";
        }

        function startMic() {
            if (!('webkitSpeechRecognition' in window)) { alert("Voice Typing is browser me support nahi karti."); return; }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN'; recognition.start();
            userInput.placeholder = "Bol bhai, sun raha hu...";
            recognition.onresult = (event) => { userInput.value = event.results[0][0].transcript; userInput.placeholder = "Mitra se kuch puch..."; };
            recognition.onerror = () => { userInput.placeholder = "Mitra se kuch puch..."; };
        }

        function speakText(button, textToSpeak) {
            if (synth.speaking) { synth.cancel(); return; } 
            let cleanText = textToSpeak.replace(/[*_#`]/g, '').replace(/[\u{1F600}-\u{1F64F}]/gu, ''); 
            let utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'hi-IN'; 
            utterance.rate = 1.1;
            button.style.color = "#38bdf8"; 
            utterance.onend = () => { button.style.color = "#94a3b8"; };
            synth.speak(utterance);
        }

        function copyCode(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let originalText = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }

        function createNewChat() {
            const newChat = {
                id: Date.now(), title: "Nayi Chat",
                messages: [{ role: "bot", text: "Namaste Bhai! Main Mitra AI hu. Kya karna hai aaj?", usedModel: "" }]
            };
            chats.unshift(newChat); currentChatId = newChat.id;
            saveData(); renderSidebar(); renderMessages();
            if(window.innerWidth <= 768) sidebar.classList.remove("open"), overlay.classList.remove("active");
        }

        function switchChat(id) {
            currentChatId = id; renderSidebar(); renderMessages();
            if(window.innerWidth <= 768) sidebar.classList.remove("open"), overlay.classList.remove("active");
        }

        function renderSidebar() {
            chatListUI.innerHTML = "";
            chats.forEach(chat => {
                const li = document.createElement("li");
                li.className = `chat-item ${chat.id === currentChatId ? "active" : ""}`;
                li.innerText = chat.title; li.onclick = () => switchChat(chat.id);
                chatListUI.appendChild(li);
            });
        }

        function renderMessages() {
            chatBox.innerHTML = "";
            const currentChat = chats.find(c => c.id === currentChatId);
            if(currentChat) {
                currentChat.messages.forEach((msg) => addMessageToUI(msg.text, msg.role, msg.image, msg.imageMime, msg.usedModel));
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addMessageToUI(text, role, imgSrc = null, mime = "image/jpeg", usedModel = "") {
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${role === "user" ? "user-wrapper" : "bot-wrapper"}`;
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${role === "user" ? "user-message" : "bot-message"}`;
            
            let finalHtml = "";
            if(imgSrc) { finalHtml += `<img src="data:${mime};base64,${imgSrc}"><br>`; }

            if(role === "bot" && !text.includes("<div class='error-text'>")) {
                let rawHtml = marked.parse(text);
                rawHtml = rawHtml.replace(/<pre><code class="(.*?)">([\s\S]*?)<\/code><\/pre>/g, function(match, lang, codeContent) {
                    let plainCode = codeContent.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
                    let encodedCode = encodeURIComponent(plainCode);
                    return `<div class="code-container"><button class="copy-btn" onclick="copyCode(this, decodeURIComponent('${encodedCode}'))">Copy</button><pre><code class="${lang}">${codeContent}</code></pre></div>`;
                });
                
                let encodedFullText = encodeURIComponent(text);
                rawHtml += `<button class="tts-btn" onclick="speakText(this, decodeURIComponent('${encodedFullText}'))" title="Sunne ke liye click kare">🔊</button>`;
                
                if (usedModel) {
                    rawHtml += `<br><span class="model-info">⚡ Replied by: ${usedModel}</span>`;
                }

                msgDiv.innerHTML = rawHtml;
                wrapper.appendChild(msgDiv);
                chatBox.appendChild(wrapper);
                msgDiv.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });

            } else {
                msgDiv.innerHTML = finalHtml + text;
                wrapper.appendChild(msgDiv);
                chatBox.appendChild(wrapper);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function typeWriterEffect(text, container, usedModel, callback) {
            container.innerHTML = "";
            let i = 0;
            container.classList.add("typing-cursor");
            
            function type() {
                if (stopTypingFlag) {
                    container.classList.remove("typing-cursor");
                    container.innerHTML += "<br><i>[Stopped by User]</i>";
                    if(callback) callback(true); 
                    return;
                }

                if (i < text.length) {
                    container.innerHTML += text.charAt(i);
                    i++; 
                    
                    const isNearBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 100;
                    if (isNearBottom) {
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                    
                    typingTimeout = setTimeout(type, 10);
                } else {
                    container.classList.remove("typing-cursor");
                    if(callback) callback(false); 
                }
            }
            type();
        }

        function saveData() { localStorage.setItem("mitra_chats_v11", JSON.stringify(chats)); }
        
        function handleEnter(event) { 
            if (event.key === "Enter") {
                if (!isGenerating) sendMessage();
            } 
        }

        function handleSendStop() {
            if (isGenerating) {
                stopTypingFlag = true; 
                if (abortController) abortController.abort(); 
                clearTimeout(typingTimeout);
                resetSendButton();
                thinkingIndicator.style.display = "none";
            } else {
                sendMessage();
            }
        }

        function resetSendButton() {
            isGenerating = false;
            sendBtn.innerText = "Send";
            sendBtn.style.background = "#38bdf8";
            sendBtn.style.color = "#050505";
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === "" && !base64Image) return;

            stopTypingFlag = false; 
            isGenerating = true;

            sendBtn.innerText = "Stop ⏹";
            sendBtn.style.background = "#f87171"; 
            sendBtn.style.color = "white";

            const currentChat = chats.find(c => c.id === currentChatId);
            if(currentChat.messages.length === 1 && text !== "") {
                currentChat.title = text.substring(0, 15) + "..."; renderSidebar();
            }

            const currentImg = base64Image; 
            const currentMime = imageMimeType || "image/jpeg";
            currentChat.messages.push({ role: "user", text: text, image: currentImg, imageMime: currentMime });
            saveData();
            addMessageToUI(text, "user", currentImg, currentMime);
            
            userInput.value = ""; removeImage();
            thinkingIndicator.style.display = "block"; 
            chatBox.scrollTop = chatBox.scrollHeight;

            // 🔥 FIX: PASSIVE IDENTITY INJECTION 🔥
            const baseRules = " STRICT RULES: 1. Tu 'MITRA.AI' hai jise 'AAYUSH' ne banaya hai. 2. MOST IMPORTANT: Apna naam ya Aayush ka naam SIRF TABHI batana jab user explicitly puche ki 'Tera naam kya hai?' ya 'Tujhe kisne banaya?'. Normal conversation me apna introduction har baar mat dena. 3. Reply natural, dostana, aur Hinglish me hona chahiye bina faltu lambe essay ke.";
            
            const selectedMood = moodSelector.value;
            let moodPrompt = baseRules;
            
            switch(selectedMood) {
                case "friend": moodPrompt += " Tu user ka best friend hai. Casual Hinglish me baat kar, ekdum bhai jaisa."; break;
                case "teacher": moodPrompt += " Tu ek expert teacher hai. Topic ko detail aur examples ke sath samjha Hinglish me."; break;
                case "coder": moodPrompt += " Tu ek pro coder hai. Clean code likh aur usko step-by-step Hinglish me samjha."; break;
                case "gamer": moodPrompt += " Tu ek hardcore gaming buddy hai. Gaming slang me reply kar Hinglish me, zaroori game details ke sath."; break;
                case "dating": moodPrompt += " Tu ek expert dating coach hai. Cool openers, aur chat advice de Hinglish me aur situation samjha ke bata."; break;
                case "otaku": moodPrompt += " Tu ek Otaku hai. Anime references use kar apni Hinglish baaton me aur story context samjha."; break;
                case "meme": moodPrompt += " Tu ek dank memer hai. Funny roasting aur dank memes generate kar Hinglish me."; break;
            }

            const promptParts = [{ text: `[System Mood: ${moodPrompt}]\n\nUser Message: ${text}` }];
            if (currentImg) {
                promptParts.push({ inlineData: { mimeType: currentMime, data: currentImg } });
            }

            const modelsToTry = [
                "gemini-2.5-flash",
                "gemini-2.0-flash",
                "gemini-3-flash-preview"
            ];

            let aiReply = null;
            let successfulModel = "";
            let errorLogs = []; 
            
            abortController = new AbortController();

            for (const model of modelsToTry) {
                if(stopTypingFlag) break; 

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: promptParts }]
                        }),
                        signal: abortController.signal
                    });

                    if (response.ok) {
                        const data = await response.json();
                        aiReply = data.candidates[0].content.parts[0].text;
                        successfulModel = model; 
                        break; 
                    } else {
                        const errorDetails = await response.json();
                        const errorMsg = errorDetails.error?.message || "Unknown API Error";
                        errorLogs.push(`<b>${model}:</b> ${errorMsg}`);
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log("Fetch aborted by user.");
                        break;
                    }
                    errorLogs.push(`<b>${model}:</b> ${error.message}`);
                }
            }

            thinkingIndicator.style.display = "none";

            if(stopTypingFlag) return;

            if (aiReply) {
                const wrapper = document.createElement("div");
                wrapper.className = `message-wrapper bot-wrapper`;
                const msgDiv = document.createElement("div");
                msgDiv.className = `message bot-message`;
                wrapper.appendChild(msgDiv);
                chatBox.appendChild(wrapper);

                typeWriterEffect(aiReply, msgDiv, successfulModel, (wasStopped) => {
                    let finalReplyToSave = wasStopped ? msgDiv.innerText : aiReply;
                    currentChat.messages.push({ role: "bot", text: finalReplyToSave, usedModel: successfulModel });
                    saveData();
                    
                    msgDiv.innerHTML = "";
                    wrapper.remove();
                    addMessageToUI(finalReplyToSave, "bot", null, "image/jpeg", successfulModel); 
                    
                    resetSendButton();
                });
            } else {
                let allErrorsFormatted = errorLogs.join("<div class='error-divider'></div>");
                const errorMsg = `Dost, kisi model se connection nahi ho paya.<br><div class='error-text'><b>Logs:</b><br>${allErrorsFormatted}</div>`;
                
                currentChat.messages.push({ role: "bot", text: errorMsg });
                saveData(); 
                addMessageToUI(errorMsg, "bot");
                resetSendButton();
            }
        }
    </script>
</body>
</html>
